<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>中间帧编辑器 · 造梦次元</title>
<script src="https://cdn.jsdelivr.net/npm/konva@9.3.16/konva.min.js"></script>
<style>
:root, html[data-theme="dark"] {
  --bg: #242424; --stage-bg: #1A1A1A; --card: #2E2E2E; --card2: #383838;
  --border: #3C3C3C; --text: #F8F8F8; --muted: #A8A8A8;
  --brand: #06C755; --brand-deep: #037C40; --mint: #9EF2B7; --forest: #074F25;
  --orange: #FF830F; --yellow: #FFE23C; --blue: #45C7FF; --danger: #E24B4A;
}
html[data-theme="light"] {
  --bg: #F0F0F0; --stage-bg: #E4E4E4; --card: #FFFFFF; --card2: #F8F8F8;
  --border: #E0E0E0; --text: #242424; --muted: #7A7A7A;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); min-height: 100vh;
  font-family: "OPPO Sans", "MiSans", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 10px; flex-wrap: wrap;
}
.logo { display: flex; align-items: center; gap: 9px; font-weight: 600; cursor: pointer; }
.logo:hover { opacity: 0.82; }
.ring { width: 22px; height: 22px; border-radius: 50%; background: #fff; border: 4px solid var(--brand); flex: none; }
.fileinfo { font-size: 12px; color: var(--muted); background: var(--card); padding: 3px 10px; border-radius: 99px; }
.hbtns { display: flex; gap: 8px; align-items: center; }
button {
  font-family: inherit; font-size: 13px; color: var(--text); background: transparent;
  border: 1px solid var(--border); border-radius: 9px; padding: 6px 12px; cursor: pointer;
}
button:hover { background: var(--card); }
button.primary { background: var(--brand); border-color: var(--brand); color: #fff; font-weight: 600; }
button.primary:hover { background: var(--brand-deep); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.toggle { display: inline-flex; background: var(--card); border-radius: 99px; padding: 2px; cursor: pointer; }
.toggle span { font-size: 12px; padding: 3px 10px; border-radius: 99px; color: var(--muted); }
.toggle span.on { background: var(--text); color: var(--bg); }
main { padding: 14px 16px; }
/* 首页 */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; margin-top: 12px; }
.grid.list { grid-template-columns: 1fr; }
.card { background: var(--card); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; position: relative; }
.card.editing { outline: 2px solid var(--brand); outline-offset: -2px; }
.card .nm { font-weight: 600; word-break: break-all; }
.card .thumb { width: 100%; aspect-ratio: 3/4; max-height: 180px; object-fit: contain; background: var(--stage-bg); border-radius: 8px; }
.card .thumb.ph { display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); }
.card .meta { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.card .editing-tag { position: absolute; top: 8px; right: 8px; background: var(--brand); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 99px; }
.card .del { color: var(--danger); border-color: transparent; padding: 5px 9px; }
.card .del:hover { background: var(--danger); color: #fff; }
.card .time { font-size: 11px; color: var(--muted); }
/* 列表视图：缩略图在左，信息在右 */
.grid.list .card { flex-direction: row; align-items: stretch; }
.grid.list .card .thumb { width: 96px; height: 128px; aspect-ratio: auto; flex: none; max-height: none; }
.grid.list .card .meta { flex: 1; }
/* 全局上传进度条 */
#upprogress { display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 80;
  background: var(--card); border-top: 1px solid var(--border); padding: 10px 16px;
  align-items: center; gap: 12px; box-shadow: 0 -3px 14px rgba(0,0,0,0.25); }
#upprogress.on { display: flex; }
#upprogress .upname { font-size: 12px; color: var(--muted); max-width: 30vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: none; }
#upprogress .upbar { flex: 1; height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; }
#upprogress .upfill { height: 100%; width: 0; background: var(--brand); border-radius: 99px; transition: width 0.2s; }
#upprogress .uptext { font-size: 12px; font-weight: 600; flex: none; min-width: 44px; text-align: right; }
/* 图层拖拽 */
.chip { touch-action: none; user-select: none; -webkit-user-select: none; }
.chip.drag { opacity: 0.92; box-shadow: 0 6px 18px rgba(0,0,0,0.35); cursor: grabbing; }
.chip .ic { font-weight: 700; opacity: 0.85; font-family: monospace; }
body.dragging { user-select: none; -webkit-user-select: none; }
/* 处理中醒目横幅 */
#procbanner { display: none; position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 90;
  background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--brand); border-radius: 12px;
  padding: 12px 18px; box-shadow: 0 6px 24px rgba(0,0,0,0.3); align-items: center; gap: 12px; max-width: 92vw; font-size: 14px; }
#procbanner.on { display: flex; }
#procbanner.ok { border-left-color: var(--brand); }
#procbanner.fail { border-left-color: var(--danger); }
#procbanner .spin { width: 18px; height: 18px; border: 3px solid var(--border); border-top-color: var(--brand);
  border-radius: 50%; animation: spin 0.8s linear infinite; flex: none; }
@keyframes spin { to { transform: rotate(360deg); } }
#procbanner .txt { font-weight: 600; }
#procbanner a { color: var(--brand); font-weight: 600; }
#procbanner .x { cursor: pointer; color: var(--muted); margin-left: 4px; font-size: 13px; }
.badge { font-size: 11px; padding: 2px 9px; border-radius: 99px; display: inline-block; }
.b-wait { background: var(--yellow); color: #633806; }
.b-run { background: var(--blue); color: #042C53; }
.b-ok { background: var(--mint); color: var(--forest); }
.b-fail { background: var(--danger); color: #fff; }
.b-none { background: var(--card2); color: var(--muted); }
.uploadbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.muted { color: var(--muted); font-size: 12px; }
/* 编辑器 */
#view-editor { display: flex; gap: 14px; align-items: flex-start; }
#stage-wrap { flex: none; background: var(--stage-bg); border-radius: 12px; padding: 14px; display: flex; align-items: center; justify-content: center; }
#panel { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.chip {
  font-size: 12px; padding: 5px 11px; border-radius: 9px; background: var(--card);
  cursor: pointer; border: 1px solid transparent; display: flex; gap: 5px; align-items: center;
}
.chip.sel { background: var(--brand); color: #fff; font-weight: 600; }
.chip .eye { opacity: 0.7; }
.chip.hid { opacity: 0.45; }
.props { background: var(--card); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 9px; }
.row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.row label { font-size: 12px; color: var(--muted); min-width: 52px; flex: none; }
.row input[type="range"] { flex: 1; min-width: 80px; accent-color: var(--brand); }
.val { font-size: 12px; background: var(--bg); border-radius: 6px; padding: 2px 7px; min-width: 38px; text-align: center; }
select, input[type="text"], input[type="number"] {
  font-family: inherit; font-size: 12px; color: var(--text); background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px; padding: 5px 8px;
}
select { max-width: 100%; }
.sw { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1px solid var(--border); flex: none; }
.sw.sel { outline: 2px solid var(--brand); outline-offset: 2px; }
input[type="color"] { width: 26px; height: 26px; border: none; background: none; cursor: pointer; padding: 0; }
.hex { width: 80px; font-family: monospace; }
.subcard { background: var(--bg); border-radius: 10px; padding: 9px 10px; display: flex; flex-direction: column; gap: 8px; }
.subcard .tt { font-size: 12px; color: var(--muted); font-weight: 600; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; }
.actions .primary { margin-left: auto; }
#status { font-size: 12px; color: var(--muted); }
#status a { color: var(--brand); }
/* 弹层 */
#modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
#modal { background: var(--card); border-radius: 14px; padding: 16px; max-width: 92vw; max-height: 88vh; overflow: auto; display: flex; flex-direction: column; gap: 10px; }
#modal img.pv { max-width: 78vw; max-height: 70vh; border-radius: 8px; }
.assets { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
.assets .a { background: var(--bg); border-radius: 8px; padding: 6px; cursor: pointer; text-align: center; }
.assets .a img { width: 100%; height: 64px; object-fit: contain; }
.assets .a div { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 8px 18px; border-radius: 99px; font-size: 13px; display: none; z-index: 99; }
@media (max-width: 760px) {
  #view-editor { flex-direction: column; }
  #stage-wrap { width: 100%; }
  header { padding: 8px 10px; }
  main { padding: 10px; }
}
</style>
</head>
<body>
<header>
  <div class="logo" id="logoHome" title="返回首页"><span class="ring"></span><span>中间帧编辑器</span></div>
  <span class="fileinfo" id="fileinfo">造梦次元 · 广告尾帧工作台</span>
  <div class="hbtns">
    <span class="toggle" id="themeToggle"><span data-t="dark">深色</span><span data-t="light">浅色</span></span>
    <button id="btnHome">记录列表</button>
    <button id="btnUploadTop">上传视频</button>
  </div>
</header>

<main id="view-home">
  <div class="uploadbar">
    <button class="primary" id="btnUpload">上传视频建任务</button>
    <input type="file" id="fileVideo" accept="video/mp4,video/quicktime" style="display:none">
    <button id="btnBackEditor" style="display:none">↩ 返回编辑器</button>
    <span class="muted" id="upmsg">支持 mp4/mov，最大 500MB（自动分片上传）</span>
    <span class="toggle" id="viewToggle" style="margin-left:auto"><span data-v="tile">平铺</span><span data-v="list">内容</span></span>
  </div>
  <div class="grid" id="records"></div>
</main>

<main id="view-editor" style="display:none">
  <div id="stage-wrap"><div id="stage"></div></div>
  <aside id="panel">
    <div class="chips" id="chips"></div>
    <div class="chips">
      <button id="btnAddText">+ 字幕</button>
      <button id="btnAddImage">+ 图片</button>
      <button id="btnSettings">⚙ 视频设置</button>
    </div>
    <div class="props" id="props"></div>
    <div class="actions">
      <button id="btnRender">精确预览</button>
      <button id="btnUseStyle">使用样式</button>
      <button id="btnSave">保存样式</button>
      <button id="btnDefault">设为默认</button>
      <button class="primary" id="btnProcess">提交处理</button>
    </div>
    <div id="status"></div>
  </aside>
</main>

<div id="modal-bg"><div id="modal"></div></div>
<div id="toast"></div>
<div id="procbanner"></div>
<input type="file" id="fileSearchBox" accept="image/*" style="display:none">
<input type="file" id="fileBgm" accept="audio/*" style="display:none">
<div id="upprogress">
  <span class="upname" id="upname"></span>
  <div class="upbar"><div class="upfill" id="upfill"></div></div>
  <span class="uptext" id="uptext"></span>
</div>
<input type="file" id="fileImage" accept="image/*" style="display:none">

<script>
const API = location.hostname.endsWith('coze.site') ? '' : 'https://a0357594-98ce-46e4-a7fe-ac797d969b21.dev.coze.site';
const SWATCHES = ['#FFFFFF', '#242424', '#06C755', '#FFE23C', '#FF830F', '#45C7FF'];
const TRANSITION_NOTE = null;

const S = {
  recordId: '', frame: null, doc: null, ctx: {}, guideText: '', guideOptions: [],
  searchBoxUrl: '', nodes: new Map(), selId: '', stage: null, layerK: null,
  scale: 1, anim: null, polling: null,
  viewMode: localStorage.getItem('h5-view') || 'tile',
  settings: {}, options: { tails: [], voices: [], transitions: [] },
};

function $(id) { return document.getElementById(id); }
function fmtTime(ms) {
  if (!ms) return '';
  const d = new Date(ms);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = 'none', 2600);
}
async function api(path, body, method) {
  const m = method || 'POST';
  const bodyless = m === 'GET' || m === 'HEAD';
  const opts = { method: m };
  if (!bodyless) {
    if (body instanceof Blob) { opts.body = body; }
    else { opts.headers = { 'Content-Type': 'application/json' }; opts.body = body ? JSON.stringify(body) : '{}'; }
  }
  const resp = await fetch(API + path, opts);
  if (!resp.ok) {
    let detail = resp.statusText;
    try { detail = (await resp.json()).detail || detail; } catch (e) {}
    throw new Error(detail);
  }
  return resp.json();
}

/* ---------- 主题 ---------- */
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('h5-theme', t);
  document.querySelectorAll('#themeToggle span').forEach(s =>
    s.classList.toggle('on', s.dataset.t === t));
}
$('themeToggle').addEventListener('click', e => {
  if (e.target.dataset.t) setTheme(e.target.dataset.t);
});
setTheme(localStorage.getItem('h5-theme') || 'dark');

/* ---------- 首页 ---------- */
function applyViewMode() {
  $('records').classList.toggle('list', S.viewMode === 'list');
  document.querySelectorAll('#viewToggle span').forEach(s => s.classList.toggle('on', s.dataset.v === S.viewMode));
}
function esc(s) { return String(s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

let _thumbQueue = [], _thumbBusy = false, _thumbGen = 0;
function queueThumb(card, recordId, gen) { _thumbQueue.push({ card, recordId, gen }); pumpThumb(); }
async function pumpThumb() {
  if (_thumbBusy) return;
  const job = _thumbQueue.shift();
  if (!job) return;
  _thumbBusy = true;
  if (job.gen === _thumbGen) {
    try {
      const r = await api('/api/v1/h5/thumbnail', { record_id: job.recordId });
      if (job.gen === _thumbGen && r.thumbnail_url) setThumb(job.card, r.thumbnail_url);
      else if (job.gen === _thumbGen) { const ph = job.card.querySelector('[data-thumb]'); if (ph) ph.textContent = '无预览'; }
    } catch (e) {}
  }
  _thumbBusy = false;
  pumpThumb();
}
function setThumb(card, url) {
  const ph = card.querySelector('[data-thumb]');
  if (!ph) return;
  const img = document.createElement('img'); img.className = 'thumb'; img.src = url;
  ph.replaceWith(img);
}

async function showHome() {
  $('view-home').style.display = '';
  $('view-editor').style.display = 'none';
  hideProcBanner();
  $('fileinfo').textContent = '造梦次元 · 广告尾帧工作台';
  $('btnBackEditor').style.display = S.recordId ? '' : 'none';
  applyViewMode();
  history.replaceState(null, '', location.pathname);
  $('records').innerHTML = '<span class="muted">加载中…</span>';
  _thumbQueue = []; _thumbGen++;
  try {
    const data = await api('/api/v1/h5/records', {});
    const rows = data.records || [];
    if (!rows.length) { $('records').innerHTML = '<span class="muted">暂无记录，先上传一个视频吧</span>'; return; }
    $('records').innerHTML = '';
    const gen = _thumbGen;
    rows.forEach(r => {
      const div = document.createElement('div'); div.className = 'card' + (r.record_id === S.recordId ? ' editing' : '');
      const badge = { '待处理': 'b-wait', '处理中': 'b-run', '成功': 'b-ok', '失败': 'b-fail' }[r.status] || 'b-none';
      const thumb = r.thumbnail_url
        ? `<img class="thumb" src="${esc(r.thumbnail_url)}">`
        : `<div class="thumb ph" data-thumb>生成预览中…</div>`;
      div.innerHTML = `
        ${r.record_id === S.recordId ? '<span class="editing-tag">编辑中</span>' : ''}
        ${thumb}
        <div class="meta">
          <span class="nm">${esc(r.name)}</span>
          <span><span class="badge ${badge}">${r.status || '未处理'}</span>
          ${r.has_style ? '<span class="badge b-none">已调样式</span>' : ''}</span>
          ${r.role_name ? `<span class="muted">角色：${esc(r.role_name)}</span>` : ''}
          ${r.created_at ? `<span class="time">创建：${fmtTime(r.created_at)}</span>` : ''}
          <div class="row">
            <button class="primary" data-act="edit">调整样式</button>
            ${r.output_video_url ? `<button data-act="out">查看成片</button>` : ''}
            <button class="del" data-act="del">删除</button>
          </div>
        </div>`;
      div.querySelector('[data-act="edit"]').onclick = () => openEditor(r.record_id);
      const ob = div.querySelector('[data-act="out"]');
      if (ob) ob.onclick = () => window.open(r.output_video_url, '_blank');
      div.querySelector('[data-act="del"]').onclick = () => deleteRecord(r, div);
      $('records').appendChild(div);
      if (!r.thumbnail_url) queueThumb(div, r.record_id, gen);
    });
  } catch (e) { $('records').innerHTML = `<span class="muted">加载失败：${esc(e.message)}</span>`; }
}

async function deleteRecord(r, card) {
  if (!confirm(`确定删除「${r.name}」？该操作不可恢复。`)) return;
  try {
    await api('/api/v1/h5/record-delete', { record_id: r.record_id });
    card.remove();
    if (r.record_id === S.recordId) { S.recordId = ''; $('btnBackEditor').style.display = 'none'; }
    toast('已删除');
    if (!$('records').querySelector('.card')) $('records').innerHTML = '<span class="muted">暂无记录，先上传一个视频吧</span>';
  } catch (e) { toast('删除失败：' + e.message); }
}

/* ---------- 全局上传进度 ---------- */
function upProgress(pct, name, text) {
  $('upprogress').classList.add('on');
  $('upfill').style.width = (pct || 0) + '%';
  $('upname').textContent = name || '';
  $('uptext').textContent = text != null ? text : (pct != null ? pct + '%' : '');
}
function upDone(msg) { $('uptext').textContent = msg || ''; setTimeout(() => $('upprogress').classList.remove('on'), 1800); }

/* ---------- 分片上传 ---------- */
async function uploadVideo(file) {
  try {
    upProgress(0, file.name, '初始化…');
    const init = await api('/api/v1/h5/upload-video/init', {});
    const cs = init.chunk_size;
    for (let off = 0, i = 0; off < file.size; off += cs, i++) {
      const pct = Math.round(Math.min(off + cs, file.size) / file.size * 100);
      upProgress(pct, file.name, pct + '%');
      await api(`/api/v1/h5/upload-video/chunk?upload_id=${init.upload_id}&index=${i}`, file.slice(off, off + cs));
    }
    upProgress(100, file.name, '合成中…');
    const fin = await api('/api/v1/h5/upload-video/finish', { upload_id: init.upload_id, filename: file.name });
    upDone('上传完成');
    toast('上传成功，进入编辑器');
    openEditor(fin.record_id);
  } catch (e) { upDone('上传失败'); toast('上传失败：' + e.message); }
}
$('btnUpload').onclick = () => $('fileVideo').click();
$('btnUploadTop').onclick = () => { $('fileVideo').click(); };
$('fileVideo').onchange = e => { if (e.target.files[0]) uploadVideo(e.target.files[0]); e.target.value = ''; };
function snapDoc() { return S.doc ? JSON.stringify({ d: cleanDoc(), g: S.guideText }) : ''; }
function isDirty() { return !!S.doc && S.savedSnapshot !== snapDoc(); }
function leaveEditorGuard() {
  if ($('view-editor').style.display !== 'none' && isDirty())
    return confirm('编辑器中有未保存的样式改动，确定离开？未保存的改动不会生效。');
  return true;
}
$('btnHome').onclick = () => { if (!leaveEditorGuard()) return; stopPoll(); showHome(); };
$('logoHome').onclick = () => { if (!leaveEditorGuard()) return; stopPoll(); showHome(); };
$('btnBackEditor').onclick = () => { if (S.recordId) openEditor(S.recordId); };
window.addEventListener('beforeunload', e => {
  if ($('view-editor').style.display !== 'none' && isDirty()) { e.preventDefault(); e.returnValue = ''; }
});
$('viewToggle').addEventListener('click', e => {
  if (!e.target.dataset.v) return;
  S.viewMode = e.target.dataset.v; localStorage.setItem('h5-view', S.viewMode); applyViewMode();
});

/* ---------- 编辑器 ---------- */
async function openEditor(recordId) {
  S.recordId = recordId;
  history.replaceState(null, '', `${location.pathname}?record_id=${recordId}`);
  $('view-home').style.display = 'none';
  $('view-editor').style.display = 'flex';
  $('props').innerHTML = '<span class="muted">加载中…（首次抽帧约5秒）</span>';
  $('chips').innerHTML = ''; $('status').textContent = '';
  try {
    const [params, frame] = await Promise.all([
      api('/api/v1/h5/params/get', { record_id: recordId }),
      api('/api/v1/h5/frame', { record_id: recordId }),
    ]);
    S.doc = params.layer_doc; S.ctx = params.context || {};
    S.guideText = params.guide_text || '';
    S.guideOptions = params.guide_options || [];
    S.searchBoxUrl = params.search_box_url || '';
    S.settings = params.settings || {};
    S.options = params.options || { tails: [], voices: [], transitions: [] };
    S.frame = frame;
    $('fileinfo').textContent = `${params.record.name} · ${frame.width}×${frame.height}`;
    S.savedSnapshot = snapDoc();
    buildStage();
  } catch (e) {
    $('props').innerHTML = `<span class="muted">加载失败：${e.message}</span>`;
  }
}

function loadImg(url) {
  // 不设置 crossOrigin：TOS 预签名链接不带 CORS 头，画布仅展示不导出，污染无影响
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img); img.onerror = rej; img.src = url;
  });
}

function stageSize() {
  const isMobile = window.innerWidth <= 760;
  const maxW = isMobile ? window.innerWidth - 48 : Math.min(420, window.innerWidth * 0.4);
  const maxH = isMobile ? window.innerHeight * 0.52 : window.innerHeight - 170;
  return Math.min(maxW / S.frame.width, maxH / S.frame.height);
}

// 节点几何中心（考虑旋转；节点原点在左上、绕原点旋转）
function getCenter(node) {
  const w = node.width() * node.scaleX(), h = node.height() * node.scaleY();
  const rad = (node.rotation() || 0) * Math.PI / 180;
  return {
    x: node.x() + (w / 2) * Math.cos(rad) - (h / 2) * Math.sin(rad),
    y: node.y() + (w / 2) * Math.sin(rad) + (h / 2) * Math.cos(rad),
  };
}
// 把节点放到使其几何中心落在 (cx,cy)（保持当前旋转/尺寸）
function setCenter(node, cx, cy) {
  const w = node.width() * node.scaleX(), h = node.height() * node.scaleY();
  const rad = (node.rotation() || 0) * Math.PI / 180;
  node.x(cx - ((w / 2) * Math.cos(rad) - (h / 2) * Math.sin(rad)));
  node.y(cy - ((w / 2) * Math.sin(rad) + (h / 2) * Math.cos(rad)));
}

async function buildStage() {
  if (S.stage) { S.stage.destroy(); S.stage = null; }
  if (S.anim) { S.anim.stop(); S.anim = null; }
  S.nodes.clear();
  S.scale = stageSize();
  const W = Math.round(S.frame.width * S.scale), H = Math.round(S.frame.height * S.scale);
  S.stage = new Konva.Stage({ container: 'stage', width: W, height: H });
  S.layerK = new Konva.Layer();
  S.stage.add(S.layerK);
  try {
    const bg = await loadImg(S.frame.frame_url);
    S.layerK.add(new Konva.Image({ image: bg, width: W, height: H, listening: false }));
  } catch (e) { toast('帧图片加载失败'); }
  S.tr = new Konva.Transformer({
    rotateEnabled: true, keepRatio: true, enabledAnchors: ['top-left', 'top-right', 'bottom-left', 'bottom-right'],
    rotationSnaps: [0, 90, 180, 270], rotationSnapTolerance: 7,
    anchorFill: '#06C755', anchorStroke: '#06C755', borderStroke: '#06C755', anchorSize: 9,
  });
  S.layerK.add(S.tr);
  S.guideV = new Konva.Line({ points: [W / 2, 0, W / 2, H], stroke: '#06C755', strokeWidth: 1, dash: [5, 4], visible: false, listening: false });
  S.guideH = new Konva.Line({ points: [0, H / 2, W, H / 2], stroke: '#06C755', strokeWidth: 1, dash: [5, 4], visible: false, listening: false });
  S.layerK.add(S.guideV); S.layerK.add(S.guideH);
  for (const layer of S.doc.layers) await addNode(layer);
  S.layerK.draw();
  startAnim();
  renderChips();
  select(S.doc.layers[0] ? lid(S.doc.layers[0]) : '');
  S.stage.on('click tap', e => { if (e.target === S.stage || !e.target.getAttr('lid')) select(''); });
}

let _lidSeq = 0;
function lid(layer) { if (!layer._lid) layer._lid = layer.id || ('ly' + (++_lidSeq)); return layer._lid; }
function defaultLayerName(l) {
  if (l.type === 'search_box') return '搜索框';
  if (l.type === 'guide_subtitle') return '引导语';
  if (l.type === 'text') return l.text_source === '角色名' ? '角色名' : '字幕';
  if (l.type === 'image') return '图片';
  return l.type;
}
function layerName(l) { return (l.name && l.name.trim()) ? l.name.trim() : defaultLayerName(l); }
// 类型符号：文字类（字幕/引导语/角色名）= T；图片类（图片/搜索框）= ▦
function layerIcon(l) { return (l.type === 'image' || l.type === 'search_box') ? '🖼' : 'T'; }
function renameLayer(l) {
  const nv = prompt('重命名图层（留空恢复默认名）', l.name || '');
  if (nv === null) return;
  l.name = nv.trim() || undefined;
  renderChips(); renderProps();
}
function textOf(l) {
  if (l.type === 'guide_subtitle') return S.guideText || '（留空=随机文案）';
  if (l.text_source && l.text_source !== '自定义') return S.ctx[l.text_source] || `（${l.text_source}为空）`;
  return l.text || '双击修改文案';
}

async function addNode(layer) {
  const W = S.stage.width(), H = S.stage.height();
  const id = lid(layer);
  let node = null, cy = layer.y ?? 0.5;
  if (layer.type === 'search_box') {
    if (!S.searchBoxUrl) return;
    try {
      const img = await loadImg(S.searchBoxUrl);
      const w = W * (layer.scale ?? 0.7), h = img.height * (w / img.width);
      node = new Konva.Image({ image: img, width: w, height: h, draggable: true });
      cy = layer.y ?? 0.18;
    } catch (e) { return; }
  } else if (layer.type === 'image') {
    if (!layer.url) return;
    try {
      const img = await loadImg(layer.url);
      const w = W * (layer.scale ?? 0.5), h = img.height * (w / img.width);
      node = new Konva.Image({ image: img, width: w, height: h, draggable: true });
      cy = layer.y ?? 0.5;
    } catch (e) { return; }
  } else {
    node = new Konva.Text({
      text: textOf(layer), fontSize: Math.max(10, W * (layer.size ?? 0.06)),
      fontFamily: getComputedStyle(document.body).fontFamily,
      fill: layer.color || '#FFFFFF', draggable: true, fontStyle: 'bold',
    });
    applyTextStyle(node, layer);
    cy = layer.y ?? 0.7;
  }
  node.rotation(layer.rotation || 0);
  setCenter(node, W * (layer.x ?? 0.5), H * cy);
  node.setAttr('lid', id);
  node.visible(layer.visible !== false);
  node.opacity(layer.opacity ?? 1);
  node.on('click tap', () => select(id));
  node.on('dragmove', () => snapToCenter(node));
  node.on('dragend', hideGuides);
  node.on('dragend transformend', () => syncBack(layer, node));
  S.nodes.set(id, node);
  S.layerK.add(node);
  if (S.tr) S.tr.moveToTop();
}

const SNAP_PX = 7;
function snapToCenter(node) {
  if (!S.guideV) return;
  const W = S.stage.width(), H = S.stage.height();
  const c = getCenter(node);
  let nx = c.x, ny = c.y, sv = false, sh = false;
  if (Math.abs(c.x - W / 2) < SNAP_PX) { nx = W / 2; sv = true; }
  if (Math.abs(c.y - H / 2) < SNAP_PX) { ny = H / 2; sh = true; }
  if (sv || sh) setCenter(node, nx, ny);
  S.guideV.visible(sv); S.guideH.visible(sh);
  if (sv) S.guideV.moveToTop();
  if (sh) S.guideH.moveToTop();
  if (S.tr) S.tr.moveToTop();
  S.layerK.batchDraw();
}
function hideGuides() {
  if (S.guideV) S.guideV.visible(false);
  if (S.guideH) S.guideH.visible(false);
  if (S.layerK) S.layerK.batchDraw();
}

function applyTextStyle(node, layer) {
  node.fill(layer.color || '#FFFFFF');
  const st = layer.stroke;
  node.stroke(st && st.width ? (st.color || '#000') : null);
  node.strokeWidth(st && st.width ? st.width * S.scale * 2 : 0);
  node.fillAfterStrokeEnabled(true);
  const sh = layer.shadow;
  node.shadowColor(sh ? (sh.color || '#000') : 'transparent');
  node.shadowOpacity(sh ? (sh.opacity ?? 0.6) : 0);
  node.shadowBlur(sh ? (sh.blur ?? 4) * S.scale : 0);
  node.shadowOffset(sh ? { x: 2, y: 2 } : { x: 0, y: 0 });
}

function syncBack(layer, node) {
  const W = S.stage.width(), H = S.stage.height();
  const c = getCenter(node);  // 含旋转的视觉中心，须在复位 scale 前取
  if (layer.type === 'search_box' || layer.type === 'image') {
    const newW = node.width() * node.scaleX(), newH = node.height() * node.scaleY();
    node.scaleX(1); node.scaleY(1);
    node.width(newW); node.height(newH);
    layer.scale = +(newW / W).toFixed(4);
  } else {
    // 文字：拖角缩放 → 映射到字号，再复位 scale
    const sc = node.scaleX();
    if (Math.abs(sc - 1) > 0.001) {
      const newFont = Math.max(10, node.fontSize() * sc);
      node.scaleX(1); node.scaleY(1);
      node.fontSize(newFont);
      layer.size = +(newFont / W).toFixed(4);
    }
  }
  setCenter(node, c.x, c.y);
  layer.x = +(c.x / W).toFixed(4);
  layer.y = +(c.y / H).toFixed(4);
  layer.rotation = Math.round(node.rotation() || 0);
  renderProps();
}

function startAnim() {
  S.anim = new Konva.Animation(frame => {
    const t = frame.time / 1000;
    for (const layer of S.doc.layers) {
      if (layer.type !== 'image' || !layer.animation || !layer.animation.type) continue;
      const node = S.nodes.get(lid(layer));
      if (!node) continue;
      const a = layer.animation, W = S.stage.width(), H = S.stage.height();
      const base = layer.opacity ?? 1;
      if (a.type === 'shake') node.offsetX(-Math.sin(2 * Math.PI * (a.speed || 1) * t) * W * (a.amplitude || 0.012));
      else node.offsetX(0);
      if (a.type === 'float') node.offsetY(-Math.sin(2 * Math.PI * (a.speed || 0.8) * t) * H * (a.amplitude || 0.018));
      else if (a.type !== 'shake') node.offsetY(0);
      if (a.type === 'blink') {
        const period = 1 / (a.speed || 1.1);
        node.opacity((t % period) < period * 0.6 ? base : base * 0.2);
      } else node.opacity(base);
    }
  }, S.layerK);
  S.anim.start();
}

/* ---------- 图层选择与属性面板 ---------- */
function restackNodes() {
  // 背景图固定在 index 0；图层按列表顺序自底向上叠放，Transformer 永远置顶
  let z = 1;
  S.doc.layers.forEach(l => { const n = S.nodes.get(lid(l)); if (n) n.zIndex(z++); });
  if (S.tr) S.tr.moveToTop();
  S.layerK.batchDraw();
}

function commitChipOrder() {
  const order = [...$('chips').querySelectorAll('.chip')].map(c => c.dataset.lid);
  S.doc.layers.sort((a, b) => order.indexOf(lid(a)) - order.indexOf(lid(b)));
  restackNodes();
  renderChips();
}

function attachChipDrag(chip) {
  chip.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('eye')) return;
    if (e.button) return;
    e.preventDefault();  // 阻止拖拽时框选图层条内的文字
    const sx = e.clientX, sy = e.clientY;
    let dragging = false;
    const follow = ev => {
      chip.style.transform = 'translate(0,0)';
      const r = chip.getBoundingClientRect();
      chip.style.transform = `translate(${ev.clientX - (r.left + r.width / 2)}px,${ev.clientY - (r.top + r.height / 2)}px)`;
    };
    const onMove = ev => {
      if (!dragging && Math.hypot(ev.clientX - sx, ev.clientY - sy) < 6) return;
      if (!dragging) {
        dragging = true; chip._moved = true; chip.classList.add('drag');
        document.body.classList.add('dragging');
        chip.style.position = 'relative'; chip.style.zIndex = '20';
      }
      // 被拖块设为穿透，让 elementFromPoint 命中其下方的目标块
      chip.style.pointerEvents = 'none';
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      chip.style.pointerEvents = '';
      const target = el && el.closest('.chip');
      const cont = $('chips');
      if (target && target !== chip && target.parentNode === cont) {
        const chips = [...cont.querySelectorAll('.chip')];
        if (chips.indexOf(chip) < chips.indexOf(target)) cont.insertBefore(chip, target.nextSibling);
        else cont.insertBefore(chip, target);
      }
      follow(ev);
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      chip.classList.remove('drag'); document.body.classList.remove('dragging');
      chip.style.transform = ''; chip.style.position = ''; chip.style.zIndex = ''; chip.style.pointerEvents = '';
      if (dragging) commitChipOrder();
    };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}

function renderChips() {
  const c = $('chips'); c.innerHTML = '';
  S.doc.layers.forEach(l => {
    const chip = document.createElement('span');
    chip.dataset.lid = lid(l);
    chip.className = 'chip' + (lid(l) === S.selId ? ' sel' : '') + (l.visible === false ? ' hid' : '');
    chip.innerHTML = `<span class="ic">${layerIcon(l)}</span><span class="lname">${esc(layerName(l))}</span><span class="eye">${l.visible === false ? '🚫' : '👁'}</span>`;
    chip.querySelector('.eye').onclick = e => {
      e.stopPropagation();
      l.visible = l.visible === false;
      const n = S.nodes.get(lid(l)); if (n) n.visible(l.visible);
      renderChips();
    };
    chip.onclick = () => { if (chip._moved) { chip._moved = false; return; } select(lid(l)); };
    chip.ondblclick = e => { e.stopPropagation(); renameLayer(l); };
    attachChipDrag(chip);
    c.appendChild(chip);
  });
}

function select(id) {
  S.selId = id;
  const node = S.nodes.get(id);
  // 图片/搜索框/文字均显示变换框；文字拖角缩放映射为字号（见 syncBack）
  if (S.tr) S.tr.nodes(node ? [node] : []);
  renderChips(); renderProps();
}

function row(html) { const d = document.createElement('div'); d.className = 'row'; d.innerHTML = html; return d; }

function colorRow(labelText, value, onPick) {
  // 选色时不重建面板（就地刷新选中高亮），系统取色器可拖着慢慢调、色板常驻
  const d = row(`<label>${labelText}</label>`);
  let hexEl;
  const refresh = c => {
    const up = (c || '').toUpperCase();
    d.querySelectorAll('.sw').forEach(s => s.classList.toggle('sel', s.dataset.c === up));
    if (hexEl) hexEl.value = c;
  };
  const pick = c => { refresh(c); onPick(c); };
  SWATCHES.forEach(c => {
    const s = document.createElement('span');
    s.className = 'sw' + (value && value.toUpperCase() === c ? ' sel' : '');
    s.dataset.c = c; s.style.background = c;
    s.onclick = () => pick(c);
    d.appendChild(s);
  });
  const picker = document.createElement('input'); picker.type = 'color'; picker.value = value || '#FFFFFF';
  picker.oninput = () => pick(picker.value.toUpperCase());
  d.appendChild(picker);
  hexEl = document.createElement('input'); hexEl.type = 'text'; hexEl.className = 'hex'; hexEl.value = value || '';
  hexEl.placeholder = '#RRGGBB 或 rgb(...)';
  hexEl.onchange = () => {
    let v = hexEl.value.trim();
    const m = v.match(/rgba?\((\d+)[,\s]+(\d+)[,\s]+(\d+)/i);
    if (m) v = '#' + [m[1], m[2], m[3]].map(n => (+n).toString(16).padStart(2, '0')).join('');
    if (/^#[0-9a-fA-F]{6}$/.test(v)) pick(v.toUpperCase()); else toast('颜色格式不正确');
  };
  d.appendChild(hexEl);
  return d;
}

function sliderRow(labelText, min, max, step, value, fmt, onChange) {
  const d = row(`<label>${labelText}</label>`);
  const r = document.createElement('input');
  r.type = 'range'; r.min = min; r.max = max; r.step = step; r.value = value;
  const v = document.createElement('span'); v.className = 'val'; v.textContent = fmt(value);
  r.oninput = () => { v.textContent = fmt(+r.value); onChange(+r.value); };
  d.appendChild(r); d.appendChild(v);
  return d;
}

function opacityRow(layer) {
  return sliderRow('不透明度', 0, 1, 0.05, layer.opacity ?? 1, v => Math.round(v * 100) + '%', v => {
    layer.opacity = v;
    const n = S.nodes.get(lid(layer));
    if (n) { n.opacity(v); S.layerK.batchDraw(); }
  });
}
function rotationRow(layer) {
  return sliderRow('旋转', -180, 180, 1, layer.rotation ?? 0, v => v + '°', v => {
    layer.rotation = v;
    const n = S.nodes.get(lid(layer));
    if (n) { const c = getCenter(n); n.rotation(v); setCenter(n, c.x, c.y); if (S.tr) S.tr.forceUpdate(); S.layerK.batchDraw(); }
  });
}

function refreshTextNode(layer) {
  const node = S.nodes.get(lid(layer));
  if (!node) return;
  const W = S.stage.width(), H = S.stage.height();
  node.text(textOf(layer));
  node.fontSize(Math.max(10, W * (layer.size ?? 0.06)));
  applyTextStyle(node, layer);
  setCenter(node, W * (layer.x ?? 0.5), H * (layer.y ?? 0.7));
  S.layerK.batchDraw();
}

function renderProps() {
  const p = $('props'); p.innerHTML = '';
  const layer = S.doc.layers.find(l => lid(l) === S.selId);
  if (!layer) { p.innerHTML = '<span class="muted">点击画布或图层条选择一个图层</span>'; return; }
  const title = row(`<label style="min-width:0;font-weight:600;color:var(--text)">${layerIcon(layer)} ${esc(layerName(layer))}</label>`);
  const ren = document.createElement('button'); ren.textContent = '✎ 重命名'; ren.style.marginLeft = 'auto';
  ren.onclick = () => renameLayer(layer);
  title.appendChild(ren);
  if (!['search_box', 'guide_subtitle'].includes(layer.type) && layer.text_source !== '角色名') {
    const del = document.createElement('button'); del.textContent = '删除图层';
    del.onclick = () => {
      S.doc.layers = S.doc.layers.filter(l => l !== layer);
      const n = S.nodes.get(lid(layer)); if (n) n.destroy();
      S.nodes.delete(lid(layer)); select(''); renderChips();
    };
    title.appendChild(del);
  }
  p.appendChild(title);

  if (layer.type === 'search_box') {
    const up = document.createElement('button'); up.className = 'primary';
    up.textContent = S.searchBoxUrl ? '更换搜索框图片' : '上传搜索框图片';
    up.onclick = () => $('fileSearchBox').click();
    const ur = row(''); ur.appendChild(up); p.appendChild(ur);
    if (!S.searchBoxUrl) p.appendChild(row('<span class="muted">该记录还没有搜索框图片，点上方按钮上传（也可在表格「搜索框图片」列上传）</span>'));
    p.appendChild(sliderRow('大小', 0.2, 1.0, 0.01, layer.scale ?? 0.7, v => Math.round(v * 100) + '%', v => {
      layer.scale = v; const n = S.nodes.get(lid(layer));
      if (n) { const W = S.stage.width(); const ratio = n.height() / n.width(); const c = getCenter(n);
        n.width(W * v); n.height(W * v * ratio); setCenter(n, c.x, c.y); S.layerK.batchDraw(); }
    }));
    p.appendChild(opacityRow(layer));
    p.appendChild(rotationRow(layer));
    p.appendChild(row('<span class="muted">画布拖拽移动、角点缩放、顶部手柄旋转</span>'));
    return;
  }

  if (layer.type === 'image') {
    p.appendChild(sliderRow('大小', 0.05, 1.0, 0.01, layer.scale ?? 0.5, v => Math.round(v * 100) + '%', v => {
      layer.scale = v; const n = S.nodes.get(lid(layer));
      if (n) { const W = S.stage.width(); const ratio = n.height() / n.width(); const c = getCenter(n);
        n.width(W * v); n.height(W * v * ratio); setCenter(n, c.x, c.y); S.layerK.batchDraw(); }
    }));
    p.appendChild(opacityRow(layer));
    p.appendChild(rotationRow(layer));
    const animSel = row('<label>动画</label>');
    const sel = document.createElement('select');
    [['', '无'], ['shake', '抖动'], ['float', '上下浮动'], ['blink', '闪烁']].forEach(([v, t]) => {
      const o = document.createElement('option'); o.value = v; o.textContent = t;
      if ((layer.animation?.type || '') === v) o.selected = true;
      sel.appendChild(o);
    });
    sel.onchange = () => { layer.animation = sel.value ? { type: sel.value } : null; renderProps(); };
    animSel.appendChild(sel); p.appendChild(animSel);
    const at = layer.animation?.type;
    if (at === 'shake' || at === 'float') {
      const isShake = at === 'shake';
      p.appendChild(sliderRow('幅度', 0.004, 0.06, 0.002, layer.animation.amplitude ?? (isShake ? 0.012 : 0.018),
        v => (v * 100).toFixed(1) + '%', v => layer.animation.amplitude = v));
      p.appendChild(sliderRow('速度', isShake ? 0.1 : 0.3, isShake ? 16 : 3, 0.1,
        layer.animation.speed ?? (isShake ? 1 : 0.8), v => v + 'Hz', v => layer.animation.speed = v));
    } else if (at === 'blink') {
      p.appendChild(sliderRow('速度', 0.3, 5, 0.1, layer.animation.speed ?? 1.1, v => v + 'Hz', v => layer.animation.speed = v));
    }
    p.appendChild(timingRow(layer));
    return;
  }

  /* 文字类图层 */
  if (layer.type === 'guide_subtitle') {
    const d = row('<label>文案</label>');
    const sel = document.createElement('select'); sel.style.flex = '1';
    const opts = [['', '（留空 = 随机文案池）'], ...S.guideOptions.map(o => [o, o]), ['__custom__', '自定义输入…']];
    opts.forEach(([v, t]) => {
      const o = document.createElement('option'); o.value = v; o.textContent = t;
      sel.appendChild(o);
    });
    sel.value = S.guideOptions.includes(S.guideText) ? S.guideText : (S.guideText ? '__custom__' : '');

  }));

}

function timingRow(layer) {
  const d = row('<label>显示时机</label>');
  const sel = document.createElement('select');
  [['full', '全程显示'], ['0', '跟随引导语第1段'], ['1', '第2段'], ['2', '第3段'], ['3', '第4段']].forEach(([v, t]) => {
    const o = document.createElement('option'); o.value = v; o.textContent = t;
    const cur = (layer.timing && typeof layer.timing === 'object') ? String(layer.timing.segment) : 'full';
    if (cur === v) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = () => layer.timing = sel.value === 'full' ? 'full' : { segment: +sel.value };
  d.appendChild(sel);
  return d;
}

function applyStyle(s) {
  if (!s.layer_doc || !Array.isArray(s.layer_doc.layers)) { toast('样式数据异常'); return; }

  if (typeof s.guide_text === 'string' && s.guide_text) S.guideText = s.guide_text;
  buildStage();
  toast('已应用样式：' + (s.name || ''));
}

function procBanner(state, text, link) {
  const b = $('procbanner');
  b.className = 'on' + (state === 'ok' ? ' ok' : state === 'fail' ? ' fail' : '');
  const icon = state === 'run' ? '<span class="spin"></span>' : state === 'ok' ? '<span>✅</span>' : '<span>❌</span>';
  b.innerHTML = `${icon}<span class="txt">${esc(text)}</span>${link ? ` <a href="${esc(link)}" target="_blank">查看成片</a>` : ''}<span class="x" id="procX">✕</span>`;
  $('procX').onclick = () => b.classList.remove('on');
}
function hideProcBanner() { $('procbanner').classList.remove('on'); }
$('btnProcess').onclick = async () => {
  procBanner('run', '正在提交…');  // 点击瞬间反馈，消除保存/提交两次网络请求的空档
  try {
    if (!(await save(false, true))) { hideProcBanner(); return; }
    await api('/api/v1/h5/process', { record_id: S.recordId });
    $('status').textContent = '已提交，处理中…（视频处理约需2-5分钟）';
    procBanner('run', '已提交，视频处理中…（约需 2–5 分钟，可继续操作）');
    startPoll();
  } catch (e) { procBanner('fail', '提交失败：' + e.message); toast('提交失败：' + e.message); }
};
function startPoll() {
  stopPoll();
  S.polling = setInterval(async () => {
    try {
      const r = await api('/api/v1/h5/record-status', { record_id: S.recordId });
      if (r.status === '成功') {
        stopPoll();
        $('status').innerHTML = `✅ 处理完成：<a href="${r.output_video_url}" target="_blank">查看成片</a>`;
        procBanner('ok', '处理完成！', r.output_video_url);
      } else if (r.status === '失败') {
        stopPoll();
        $('status').textContent = '❌ 处理失败：' + (r.error || '').slice(0, 160);
        procBanner('fail', '处理失败：' + (r.error || '未知错误').slice(0, 80));
      } else {
        $('status').textContent = `处理中…（状态：${r.status || '排队'}）`;
        procBanner('run', `视频处理中…（状态：${r.status || '排队'}）`);
      }
    } catch (e) {}
  }, 5000);
}
function stopPoll() { if (S.polling) { clearInterval(S.polling); S.polling = null; } }

/* ---------- 启动 ---------- */
window.addEventListener('resize', () => { if (S.recordId && S.frame) buildStage(); });
const rid = new URLSearchParams(location.search).get('record_id');
if (rid) openEditor(rid); else showHome();
</script>
</body>
</html>
